name: Pinpoint
version: '1.3.34'
main: com.pinpoint.PinpointPlugin
api-version: '1.21'
description: Geyser-compatible craftable waypoint system
softdepend: [Vault, Geyser-Spigot]

commands:
  waypoint:
    description: Main Pinpoint command
    usage: |
      /waypoint           - Open Pinpoint hub GUI
      /waypoint menu      - Open Pinpoint hub GUI
      /waypoint list      - List your accessible Pinpoints
      /waypoint reload    - Reload config and data (admin)
      /waypoint give <player> waypoint [amount]
      /waypoint give <player> compass [amount]
      /waypoint landmark create <name>
      /waypoint landmark delete <name>
      /waypoint landmark list
      /waypoint landmark reload
    aliases: [wp, pinpoint]
  party:
    description: Party/social linking system
    usage: |
      /party              - Open party management GUI
      /party leave        - Leave your current party
      /party disband      - Disband the whole party
      /party remove <player> - Remove a member from the party
      /party accept       - Accept a pending link request
      /party deny         - Deny a pending link request
      /party follow       - Follow your party's latest travel
      /party stay         - Dismiss the current travel offer
    aliases: [pp]

permissions:
  waypoint.use:
    description: Use waypoints, open hub GUI, teleport, create waypoints
    default: true
  waypoint.list:
    description: Use /waypoint list
    default: true
  waypoint.give:
    description: Use /waypoint give to hand out waypoint items and compasses
    default: op
  waypoint.reload:
    description: Use /waypoint reload
    default: op
  waypoint.admin:
    description: All admin permissions (includes give + reload)
    default: op
    children:
      waypoint.give: true
      waypoint.reload: true
  party.use:
    description: Use the party/social linking system
    default: true
  pinpoint.icons.media:
    description: Unlocks media-themed extra icons in the icon picker
    default: false
  pinpoint.icons.vip:
    description: Unlocks VIP-themed extra icons in the icon picker
    default: false
  pinpoint.icons.admin:
    description: Unlocks admin-themed extra icons in the icon picker
    default: op
  pinpoint.admin.landmark:
    description: All landmark admin permissions
    default: op
    children:
      pinpoint.admin.landmark.create: true
      pinpoint.admin.landmark.delete: true
      pinpoint.admin.landmark.list: true
      pinpoint.admin.landmark.reload: true
  pinpoint.admin.landmark.create:
    description: Create landmarks via /wp landmark create
    default: op
  pinpoint.admin.landmark.delete:
    description: Delete landmarks via /wp landmark delete
    default: op
  pinpoint.admin.landmark.list:
    description: List landmarks via /wp landmark list
    default: op
  pinpoint.admin.landmark.reload:
    description: Reload landmark config via /wp landmark reload
    default: op
