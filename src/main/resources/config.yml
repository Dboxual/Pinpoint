compass:
  # Automatically give a Pinpoint Compass to any player who has never received one.
  # Tracked permanently per UUID in plugins/Pinpoint/compass-received.yml.
  # Covers new players, existing players, and anyone who joins after this update.
  enabled: true
  message: "&bYou received a Pinpoint Compass!"
  inventory-full: "&eYour inventory was full. Your Pinpoint Compass was dropped nearby."

landmarks:
  # Enable the Landmarks system (admin-created global waypoints).
  enabled: true
  hologram:
    # MiniMessage format. Use %name% for the landmark name.
    line-1: "<gradient:#00e5ff:#8a2be2><bold>%name%</bold></gradient>"
    color: "AQUA"
  gui:
    title: "&bLandmarks"
    icon: "BEACON"
    category-name: "&bLandmarks"
  teleport:
    enabled: true
    # Cost to teleport to a landmark (0 = free). Vault required for non-zero cost.
    cost: 0
    # Landmark teleport delay is controlled by teleport.compass-delay-seconds and
    # teleport.block-delay-seconds at the top of this file.
  block:
    # Material for the Landmark Block item given during /wp landmark create.
    material: "LODESTONE"
    # MiniMessage format for the item display name.
    name: "<gradient:#00e5ff:#8a2be2><bold>Landmark Block</bold></gradient>"
    lore:
      - "&7Admin-only travel landmark."
      - "&7Place this during landmark setup."
    no-permission-message: "&cYou do not have permission to place Landmark Blocks."
    setup-required-message: "&cUse /wp landmark create <name> before placing a Landmark Block."

teleport:
  # Delay (seconds) when teleporting via the Pinpoint Compass or any GUI tab.
  # Applies to all waypoint types including Landmarks. Always 5 seconds.
  compass-delay-seconds: 5
  # Delay (seconds) when teleporting by physically right-clicking a placed Pinpoint or Landmark block.
  # Applies to all waypoint types including Landmarks. Always 5 seconds.
  block-delay-seconds: 5

settings:
  # Default teleport fee (0 = free). Applied when a waypoint is first created.
  default-fee: 0
  # Radius (in blocks) to search for a safe landing spot near the waypoint.
  safe-teleport-radius: 5
  # Seconds a player must wait between teleports after a successful one (all players).
  teleport-cooldown-seconds: 3
  # Maximum number of waypoints a single player may own (0 = unlimited).
  max-waypoints-per-player: 10
  # Seconds before a pending teleport invite expires.
  invite-timeout: 60
  # Seconds before a party link request expires.
  link-request-timeout: 60
  # Seconds party members have to click [Follow] after a Pinpoint travel notification.
  party-travel-offer-timeout: 30
  # (player-to-player teleport settings are in the player-teleport section below)

player-teleport:
  # Seconds before an unanswered player teleport request expires.
  request-expire-seconds: 10
  # Seconds both players must stand still after the request is accepted before teleporting.
  stand-still-seconds: 10
  # Bops charged to each player when a player-to-player teleport completes (0 = free).
  cost-bops: 100

holograms:
  # Whether to display floating info above each placed waypoint block.
  enabled: true
  # Height above the block's Y coordinate where the bottom hologram line appears.
  height: 2.8
  # Include the owner's name in the hologram.
  show-owner: true
  # Include the fee (or "Free") in the hologram. Only shown when Vault is enabled.
  show-fee: true
  # Maximum distance in blocks at which a player can see a hologram (default 8).
  view-distance: 8
  # Hide holograms when the player has no direct line of sight to the Pinpoint block.
  # Prevents holograms from revealing bases through walls.
  require-line-of-sight: true

# Permission-gated extra icons for the icon picker GUI.
# Format: permission.node followed by a list of Material names (case-insensitive).
# Players who have the permission see those icons in the picker.
# Players who do not have the permission do not see them at all.
# Add or remove groups freely — the plugin does not care about role names.
# To disable a group, remove it or comment it out.
icon-permissions:
  pinpoint.icons.vip:
    - GOLD_BLOCK
    - DIAMOND_BLOCK
    - NETHER_STAR
    - BEACON
    - TOTEM_OF_UNDYING
  pinpoint.icons.media:
    - NOTE_BLOCK
    - JUKEBOX
    - SPYGLASS
    - PAINTING
    - GLOW_ITEM_FRAME
  pinpoint.icons.admin:
    - COMMAND_BLOCK
    - SPAWNER
    - STRUCTURE_BLOCK
    - BEDROCK

