settings:
  # Default teleport fee (0 = free). Applied when a waypoint is first created.
  default-fee: 0
  # Radius (in blocks) to search for a safe landing spot near the waypoint.
  safe-teleport-radius: 5
  # Block right-click teleport delay (seconds). 0 = near-instant. Player still needs to pass fee/safe-spot checks.
  waypoint-block-teleport-delay-seconds: 5
  # Pearl right-click teleport delay (seconds). Player must stand still for this long before teleporting.
  waypoint-pearl-teleport-delay-seconds: 10
  # Seconds a player must wait between teleports after a successful one (all players).
  teleport-cooldown-seconds: 3
  # Maximum number of waypoints a single player may own (0 = unlimited).
  max-waypoints-per-player: 10
  # Seconds before a pending teleport invite expires.
  invite-timeout: 60
  # Seconds before a party link request expires.
  link-request-timeout: 60
  # Seconds party members have to click [Follow] after a Pinpoint travel notification.
  party-travel-offer-timeout: 30

holograms:
  # Whether to display floating info above each placed waypoint block.
  enabled: true
  # Height above the block's Y coordinate where the bottom hologram line appears.
  height: 2.8
  # Include the owner's name in the hologram.
  show-owner: true
  # Include the fee (or "Free") in the hologram. Only shown when Vault is enabled.
  show-fee: true

